openapi: 3.0.0
info:
  title: ThingsBoard Device Telemetry & Attributes API
  description: |
    This API documentation explains how to send data (telemetry and attributes) to devices created in ThingsBoard.
    
    In the FlowGuard project, devices are created during the deployment process (`deploy/1_Configuracion_General.py`). 
    Each device is assigned a unique **Access Token** which is used to authenticate the requests.
    
    You can find the Access Tokens for your devices in the following location:
    `deploy/{Customer}/DeviceimportCredentials_{Customer}.csv`
    
    Example (for ESAMUR): `deploy/ESAMUR/DeviceimportCredentials_ESAMUR.csv`
  version: 1.0.0
servers:
  - url: http://localhost:9090
    description: Local ThingsBoard Instance
paths:
  /api/v1/{access_token}/telemetry:
    post:
      summary: Send Telemetry
      description: Sends time-series data to a specific device.
      parameters:
        - name: access_token
          in: path
          required: true
          description: The Access Token of the device.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
            example:
              temperature: 25.5
              humidity: 60
              status: "active"
      responses:
        '200':
          description: Telemetry data accepted.
        '401':
          description: Invalid Access Token.
        '400':
          description: Invalid JSON format.

  /api/v1/{access_token}/attributes:
    post:
      summary: Send Attributes
      description: Sends client-side attributes to a specific device.
      parameters:
        - name: access_token
          in: path
          required: true
          description: The Access Token of the device.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                oneOf:
                  - type: string
                  - type: number
                  - type: boolean
            example:
              version: "v1.2.3"
              location: "Building A"
              frequency: 5
      responses:
        '200':
          description: Attributes accepted.
        '401':
          description: Invalid Access Token.
