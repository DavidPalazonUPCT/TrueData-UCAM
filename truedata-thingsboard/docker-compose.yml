services:
  # Servicio ThingsBoard
  thingsboard:
    restart: always
    image: thingsboard/tb-postgres:4.1.0
    ports:
      - "9090:9090"                           # Acceso a ThingsBoard en el puerto 9090
      - "1883:1883"
      - "7070:7070"
      - "5683-5688:5683-5688/udp"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_TYPE: postgresql
      DATABASE_NAME: thingsboard
      DATABASE_USER: thingsboard
      DATABASE_PASSWORD: thingsboard_password
    volumes:
      - tb-data:/data
      - tb-logs:/var/log/thingsboard
    depends_on:
      - db
    networks:
      - iot_network

  # Servicio de ThingsBoard db
  db:
    image: "postgres:13"
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: thingsboard
      POSTGRES_PASSWORD: thingsboard_password
      POSTGRES_DB: thingsboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iot_network

networks:
  iot_network:
    external: true                       # Esto le dice a Docker que la red ya existe
    name: truedata_iot_network  # Usa el nombre de la red que ya existe

volumes:
  tb-data:
  tb-logs:
  postgres-data:
