name: truedata

services:
  # Servicio Node-RED
  nodered_tb:
    restart: always
    image: nodered/node-red:3.1.9
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
      - ./settings.js:/data/settings.js:ro
    environment:
      - TZ=Europe/Madrid
      # Habilita los admin endpoints del flow (testing helpers de Fase 2.2).
      # Solo en entorno de desarrollo. En producción, NO setear esta variable
      # — los endpoints /admin/{set,clear,get}-ml-url devuelven 404 sin leak.
      - NR_ADMIN_ENABLED=true
    # TB_GATEWAY_TOKEN se inyecta vía env_file.
    # El path depende de $CLIENT (single-tenant): el operador exporta CLIENT o lo
    # pone en un `.env` en la raíz del repo. Ver deploy/README.md "Bring-up".
    env_file:
      - ../deploy/secrets/${CLIENT:?CLIENT must be set (export CLIENT=<id> or add to .env)}/nodered-gateway.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - iot_network
    user: "0:0"                               # Ejecuta el contenedor como root

networks:
  iot_network:
    external: true                       # Esto le dice a Docker que la red ya existe
    name: truedata_iot_network  # Usa el nombre de la red que ya existe
